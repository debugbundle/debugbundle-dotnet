name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish NuGet packages
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore -p:PackageVersion=${{ steps.version.outputs.value }} -p:VersionPrefix=${{ steps.version.outputs.value }}
      - run: dotnet test --configuration Release --no-build
      - run: dotnet format --verify-no-changes
      - run: dotnet pack --configuration Release --no-build --output artifacts/packages -p:PackageVersion=${{ steps.version.outputs.value }} -p:VersionPrefix=${{ steps.version.outputs.value }}
      - name: Write smoke NuGet config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/smoke | Out-Null
          $packageSource = [System.IO.Path]::GetFullPath("artifacts/packages")
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-packages" value="$packageSource" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          "@ | Set-Content -Path artifacts/smoke/NuGet.config -NoNewline -Encoding utf8
      - name: Staged-package smoke
        shell: bash
        run: |
          for tfm in net8.0 net10.0; do
            rm -rf "artifacts/smoke-$tfm"
            dotnet restore smoke/clean-install/DebugBundle.Smoke.csproj \
              -p:DebugBundlePackageVersion=${{ steps.version.outputs.value }} \
              -p:DebugBundleSmokeTargetFramework="$tfm" \
              --packages "artifacts/smoke-$tfm/nuget-cache" \
              --configfile artifacts/smoke/NuGet.config
            dotnet run --project smoke/clean-install/DebugBundle.Smoke.csproj \
              --configuration Release \
              --no-restore \
              -p:DebugBundlePackageVersion=${{ steps.version.outputs.value }} \
              -p:DebugBundleSmokeTargetFramework="$tfm"
          done

      - name: NuGet trusted publishing login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish packages
        shell: bash
        run: |
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

      - name: Published-package smoke
        shell: bash
        run: |
          for attempt in $(seq 1 20); do
            rm -rf artifacts/smoke-published
            success=1
            for tfm in net8.0 net10.0; do
              if ! dotnet restore smoke/clean-install/DebugBundle.Smoke.csproj \
                -p:DebugBundlePackageVersion=${{ steps.version.outputs.value }} \
                -p:DebugBundleSmokeTargetFramework="$tfm" \
                --packages "artifacts/smoke-published/$tfm/nuget-cache" \
                --source https://api.nuget.org/v3/index.json; then
                success=0
                break
              fi
              dotnet run --project smoke/clean-install/DebugBundle.Smoke.csproj \
                --configuration Release \
                --no-restore \
                -p:DebugBundlePackageVersion=${{ steps.version.outputs.value }} \
                -p:DebugBundleSmokeTargetFramework="$tfm"
            done
            if [ "$success" -eq 1 ]; then
              exit 0
            fi
            sleep 30
          done
          exit 1
