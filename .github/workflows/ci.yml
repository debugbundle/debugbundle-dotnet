name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: .NET ${{ matrix.dotnet }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet: ["8.0.x", "10.0.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage"
      - run: dotnet format --verify-no-changes
      - run: dotnet pack --configuration Release --no-build --output artifacts/packages
      - run: dotnet restore smoke/clean-install/DebugBundle.Smoke.csproj --packages artifacts/smoke/nuget-cache --source artifacts/packages --source https://api.nuget.org/v3/index.json
      - run: dotnet run --project smoke/clean-install/DebugBundle.Smoke.csproj --configuration Release --no-restore
