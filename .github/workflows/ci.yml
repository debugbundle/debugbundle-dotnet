name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: .NET ${{ matrix.dotnet }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet: ["8.0.x", "10.0.x"]
    env:
      SMOKE_TFM: ${{ matrix.dotnet == '10.0.x' && 'net10.0' || 'net8.0' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage"
      - run: dotnet format --verify-no-changes
      - run: dotnet pack --configuration Release --no-build --output artifacts/packages
      - name: Write smoke NuGet config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/smoke | Out-Null
          $packageSource = [System.IO.Path]::GetFullPath("artifacts/packages")
          @"
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="local-packages" value="$packageSource" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          "@ | Set-Content -Path artifacts/smoke/NuGet.config -NoNewline -Encoding utf8
      - run: dotnet restore smoke/clean-install/DebugBundle.Smoke.csproj -p:DebugBundleSmokeTargetFramework=${{ env.SMOKE_TFM }} --packages artifacts/smoke/nuget-cache --configfile artifacts/smoke/NuGet.config
      - run: dotnet run --project smoke/clean-install/DebugBundle.Smoke.csproj --configuration Release --no-restore -p:DebugBundleSmokeTargetFramework=${{ env.SMOKE_TFM }}
